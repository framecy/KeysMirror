name: KeysMirror
options:
  bundleIdPrefix: com.keysmirror
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.3"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    PRODUCT_NAME: KeysMirror

targets:
  KeysMirror:
    type: application
    platform: macOS
    sources:
      - path: KeysMirror
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
          - "KeysMirror.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keysmirror.KeysMirror
        INFOPLIST_FILE: KeysMirror/Info.plist
        CODE_SIGN_ENTITLEMENTS: KeysMirror/KeysMirror.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: KeysMirror/KeysMirror.entitlements
    resources:
      - path: KeysMirror/Resources
  KeysMirrorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KeysMirrorTests
    dependencies:
      - target: KeysMirror
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keysmirror.KeysMirrorTests
        PRODUCT_NAME: KeysMirrorTests
        PRODUCT_MODULE_NAME: KeysMirrorTests
        GENERATE_INFOPLIST_FILE: YES

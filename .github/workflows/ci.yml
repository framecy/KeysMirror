name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build & Test
        run: |
          xcodebuild \
            -project KeysMirror.xcodeproj \
            -scheme KeysMirror \
            -destination 'platform=macOS' \
            -configuration Debug \
            test 2>&1 | xcpretty || (xcodebuild \
              -project KeysMirror.xcodeproj \
              -scheme KeysMirror \
              -destination 'platform=macOS' \
              -configuration Debug \
              test; exit 1)
